<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Spelling Adventure</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #fdfcf0;
            --primary-color: #6c5ce7;
            --text-color: #2d3436;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* Top Progress Bar */
        #progress-container {
            position: absolute;
            top: 20px;
            width: 80%;
            height: 20px;
            background: #dfe6e9;
            border-radius: 10px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            width: 10%;
            background: #55efc4;
            transition: width 0.5s ease;
        }

        #number-digit {
            font-size: 8rem;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            margin: 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .slots-container {
            display: flex;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .slot {
            width: 80px;
            height: 80px;
            border: 4px dashed #b2bec3;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            background: white;
            transition: all 0.2s;
        }

        .slot.filled {
            border-style: solid;
            border-color: #00b894;
            background: #e8f5e9;
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.5); }
            100% { transform: scale(1); }
        }

        .letters-container {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            min-height: 100px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 20px;
        }

        .letter {
            width: 75px;
            height: 75px;
            background: #fab1a0;
            border-bottom: 6px solid #e17055;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            cursor: grab;
            user-select: none;
            touch-action: none;
            position: relative;
        }

        /* Success Overlay */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        #overlay.show { display: flex; }

        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
        }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="number-digit">1</div>
    <div class="slots-container" id="slots-box"></div>
    <div class="letters-container" id="pool-box"></div>

    <div id="overlay">
        <h1 id="overlay-text" style="font-size: 4rem; color: #6c5ce7;">GREAT!</h1>
        <button class="btn" id="next-btn">Next Number ➔</button>
    </div>

    <script>
        const gameData = [
            { digit: 1, word: "ONE" },
            { digit: 2, word: "TWO" },
            { digit: 3, word: "THREE" },
            { digit: 4, word: "FOUR" },
            { digit: 5, word: "FIVE" },
            { digit: 6, word: "SIX" },
            { digit: 7, word: "SEVEN" },
            { digit: 8, word: "EIGHT" },
            { digit: 9, word: "NINE" },
            { digit: 10, word: "TEN" }
        ];

        let currentLevel = 0;
        let solvedLetters = 0;
        const synth = window.speechSynthesis;

        function speak(text) {
            synth.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 0.9;
            msg.pitch = 1.1;
            synth.speak(msg);
        }

        function initLevel() {
            const data = gameData[currentLevel];
            solvedLetters = 0;
            
            // Update UI
            document.getElementById('number-digit').textContent = data.digit;
            document.getElementById('progress-bar').style.width = ((currentLevel + 1) / gameData.length) * 100 + "%";
            document.getElementById('overlay').classList.remove('show');

            // Setup Slots
            const slotsBox = document.getElementById('slots-box');
            slotsBox.innerHTML = '';
            data.word.split('').forEach((char, index) => {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.dataset.char = char;
                slot.dataset.index = index;
                slotsBox.appendChild(slot);
            });

            // Setup Letters (Shuffled)
            const poolBox = document.getElementById('pool-box');
            poolBox.innerHTML = '';
            const shuffled = data.word.split('').sort(() => Math.random() - 0.5);
            shuffled.forEach(char => {
                const letterEl = document.createElement('div');
                letterEl.className = 'letter';
                letterEl.textContent = char;
                letterEl.dataset.char = char;
                letterEl.onpointerdown = startDrag;
                poolBox.appendChild(letterEl);
            });

            speak(`Can you spell ${data.word}?`);
        }

        // Drag Logic
        let activeEl = null;
        let startX, startY;

        function startDrag(e) {
            activeEl = e.target;
            startX = e.clientX;
            startY = e.clientY;
            activeEl.style.zIndex = 1000;
            activeEl.setPointerCapture(e.pointerId);
            activeEl.onpointermove = moveDrag;
            activeEl.onpointerup = endDrag;
            speak(activeEl.dataset.char);
        }

        function moveDrag(e) {
            if (!activeEl) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            activeEl.style.transform = `translate(${dx}px, ${dy}px)`;
        }

        function endDrag(e) {
            if (!activeEl) return;
            
            const char = activeEl.dataset.char;
            const slots = document.querySelectorAll('.slot');
            let success = false;

            slots.forEach(slot => {
                const rect = slot.getBoundingClientRect();
                const isInside = (
                    e.clientX > rect.left && e.clientX < rect.right &&
                    e.clientY > rect.top && e.clientY < rect.bottom
                );

                // Check if it's the correct letter for this specific slot position
                if (isInside && slot.dataset.char === char && !slot.classList.contains('filled')) {
                    slot.textContent = char;
                    slot.classList.add('filled');
                    activeEl.remove();
                    success = true;
                    solvedLetters++;
                    speak(char);
                }
            });

            if (!success) {
                activeEl.style.transform = 'translate(0,0)';
                activeEl.style.zIndex = 10;
            }

            activeEl.onpointermove = null;
            activeEl.onpointerup = null;
            activeEl = null;

            checkWin();
        }

        function checkWin() {
            const data = gameData[currentLevel];
            if (solvedLetters === data.word.length) {
                setTimeout(() => {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    speak(`Perfect! ${data.word} spells ${data.digit}`);
                    
                    if (currentLevel < gameData.length - 1) {
                        document.getElementById('overlay').classList.add('show');
                    } else {
                        document.getElementById('overlay-text').textContent = "YOU ARE A GENIUS!";
                        document.getElementById('next-btn').textContent = "Start Over";
                        document.getElementById('overlay').classList.add('show');
                    }
                }, 500);
            }
        }

        document.getElementById('next-btn').onclick = () => {
            if (currentLevel < gameData.length - 1) {
                currentLevel++;
            } else {
                currentLevel = 0;
            }
            initLevel();
        };

        // Initialize first level
        window.onload = initLevel;
    </script>
</body>
</html>
