<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyboard Number Explorer</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root {
    --bg: #1a1a2e;
    --text: #ffffff;
    --success: #6ab04c;
    --hint: #f0932b;
}

body {
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    background-color: var(--bg);
    font-family: 'Segoe UI', Arial, sans-serif;
    color: var(--text);
    overflow-x: hidden;
    overflow-y: auto;
}

/* Progress */
#progress {
    font-size: 1.2rem;
    letter-spacing: 3px;
    color: #95afc0;
    margin-bottom: 10px;
}

/* Big Number */
#digit-display {
    font-size: clamp(1rem, 12vw, 8rem);
    margin: 10px 0;
    color: var(--hint);
    text-shadow: 0 0 20px rgba(240,147,43,0.5);
}

/* Word slots */
.word-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin: 20px 0;
}

.letter-slot {
    width: 70px;
    height: 90px;
    border-bottom: 6px solid #535c68;
    font-size: 3rem;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
}

.letter-slot.active {
    border-color: var(--hint);
}

.letter-slot.filled {
    border-color: var(--success);
    color: var(--success);
}

/* Hint box */
#hint-box {
    background: #30336b;
    padding: 15px 25px;
    border-radius: 15px;
    text-align: center;
    margin-top: 10px;
}

#target-key {
    font-size: 3rem;
    color: #ffbe0b;
}

/* Buttons */
.controls {
    margin-top: 25px;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
}

.btn {
    padding: 12px 25px;
    font-size: 1rem;
    font-weight: bold;
    border: none;
    border-radius: 40px;
    cursor: pointer;
}

.btn-repeat {
    background: #eb4d4b;
    color: white;
}

.btn-next {
    background: #6ab04c;
    color: white;
    display: none;
}

.btn-next.show {
    display: inline-block;
}
</style>
</head>

<body>

<div id="progress">LEVEL 1 OF 5</div>

<h1 id="digit-display">1</h1>

<div class="word-container" id="word-box"></div>

<div id="hint-box">
    <p>FIND THIS KEY:</p>
    <span id="target-key">O</span>
</div>

<div class="controls">
    <button class="btn btn-repeat" onclick="repeatLevel()">🔄 REPEAT</button>
    <button class="btn btn-next" id="next-btn" onclick="nextLevel()">NEXT ➔</button>
</div>

<script>
const gameData = [
    { digit: 1, word: "ONE" },
    { digit: 2, word: "TWO" },
    { digit: 3, word: "THREE" },
    { digit: 4, word: "FOUR" },
    { digit: 5, word: "FIVE" }
];

let currentLevel = 0;
let currentLetterIndex = 0;
let isLevelComplete = false;

function speak(text) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.8;
    window.speechSynthesis.speak(msg);
}

function initLevel() {
    const data = gameData[currentLevel];
    currentLetterIndex = 0;
    isLevelComplete = false;

    document.getElementById('progress').textContent =
        `LEVEL ${currentLevel + 1} OF ${gameData.length}`;

    document.getElementById('digit-display').textContent = data.digit;

    document.getElementById('next-btn').classList.remove('show');

    const wordBox = document.getElementById('word-box');
    wordBox.innerHTML = '';

    data.word.split('').forEach((char, i) => {
        const slot = document.createElement('div');
        slot.className = 'letter-slot';
        slot.id = `slot-${i}`;
        wordBox.appendChild(slot);
    });

    updateHint();

    speak(`Number ${data.digit}. Spell ${data.word}. Find ${data.word[0]}`);
}

function updateHint() {
    const data = gameData[currentLevel];
    const targetChar = data.word[currentLetterIndex];

    document.querySelectorAll('.letter-slot')
        .forEach(s => s.classList.remove('active'));

    const active = document.getElementById(`slot-${currentLetterIndex}`);
    if (active) active.classList.add('active');

    document.getElementById('target-key').textContent = targetChar;
}

document.addEventListener('keydown', (e) => {
    if (isLevelComplete) return;

    const key = e.key.toUpperCase();
    const data = gameData[currentLevel];
    const target = data.word[currentLetterIndex];

    if (key === target) {
        const slot = document.getElementById(`slot-${currentLetterIndex}`);
        slot.textContent = target;
        slot.classList.add('filled');

        currentLetterIndex++;

        if (currentLetterIndex >= data.word.length) {
            win();
        } else {
            speak(`Good! Now find ${data.word[currentLetterIndex]}`);
            updateHint();
        }
    } else {
        if (key.length === 1) {
            speak(`Try again. Find ${target}`);
        }
    }
});

function win() {
    isLevelComplete = true;

    if (typeof confetti === "function") {
        confetti({ particleCount: 100, spread: 70 });
    }

    document.getElementById('next-btn').classList.add('show');
    document.getElementById('target-key').textContent = "⭐";

    const data = gameData[currentLevel];
    speak(`Great! ${data.word}`);
}

function nextLevel() {
    currentLevel = (currentLevel + 1) % gameData.length;
    initLevel();
}

function repeatLevel() {
    initLevel();
}

window.onload = initLevel;
</script>

</body>
</html>
